name: Bug Report
description: Create a report to help us improve the ystack agents or tooling
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Remember, ystack relies on standard formatting. Please be specific.
  - type: input
    id: version
    attributes:
      label: ystack Version
      description: What version of ystack are you running? (or what commit hash)
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Which agent is failing?
      description: Select the relevant agent or tool.
      options:
        - Orchestrator
        - Frontend
        - Backend
        - QA
        - Review
        - Ship
        - RootCause
        - Docs
        - Motion
        - Marketing
        - Core IDE Plugin / Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Briefly explain the bug. For example, "The Frontend agent vibecoded a generic gradient despite taste-skill being active."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: Explain the correct behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the exact prompt or context you gave the swarm.
    validations:
      required: true
